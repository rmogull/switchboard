# Phase 0 / Spike 3 — proposed tmux config for orchestrator interactive sessions.
# Validated for syntax in the build sandbox; validate the *scroll feel* on-device in Prompt.

set -g mouse on                 # wheel / two-finger scroll enters copy-mode and scrolls
set -g history-limit 50000      # enough scrollback to actually review long sessions
set -g mode-keys vi             # vi-style movement in copy-mode

# Deterministic way into scrollback that does NOT depend on the touch gesture landing:
#   prefix + e  -> enter copy-mode (then arrow/PageUp or vi keys to scroll; q to exit)
bind e copy-mode

# Quality-of-life for reviewing on a phone:
set -g focus-events on
set -g status-interval 5
